<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionStack Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-glass);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        /* --- Grid Layout --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* --- Glassmorphism Cards --- */
        .card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 0 1.5rem 0;
            flex-grow: 1;
        }

        .credentials {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .cred-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }
        .cred-row:last-child {
            margin-bottom: 0;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem 0;
            background: var(--accent);
            color: #0f172a;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s ease;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn:hover {
            background: var(--accent-hover);
            color: #fff;
        }

        /* --- Vault Section --- */
        .vault-container {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .vault-header {
            margin-bottom: 1.5rem;
        }

        .vault-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }

        .vault-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        #vaultContent {
            display: none;
            margin-top: 2rem;
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-glass);
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a7f3d0;
        }
        
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>visionstack</h1>
        <p class="subtitle">Unified Network Observability & Management Suite</p>
    </header>

    <div class="grid" id="cardGrid">
        <!-- Cards injected via JS to grab dynamic window.location.hostname -->
    </div>

    <div class="vault-container">
        <div class="vault-header">
            <h2 class="vault-title">🔒 System Credential Vault</h2>
            <p class="vault-desc">Enter your underlying Linux Host credentials to decrypt the raw visionstack_credentials.txt file.</p>
        </div>
        
        <div id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Linux Username (e.g. root, ubuntu)">
                <input type="password" id="password" placeholder="Linux Password">
            </div>
            <button class="btn" onclick="unlockVault()">Unlock Vault</button>
            <div id="errorMsg" class="error-msg">Authentication failed. Please check your host credentials.</div>
        </div>

        <div id="vaultContent">
            <pre id="rawCredentials"></pre>
        </div>
    </div>
</div>

<script>
    // Dynamically build URLs relative to the current host
    const host = window.location.hostname;
    
    const apps = [
        {
            name: "NetClaw (Host)",
            desc: "Native Host Lab / ContainerLab Orchestration",
            port: 8000,
            user: "N/A",
            pass: "N/A"
        },
        {
            name: "Portainer",
            desc: "Docker GUI & Stack Management",
            port: 8010,
            user: "admin",
            pass: "[Master Password]"
        },
        {
            name: "Netbox",
            desc: "IPAM & DCIM (Source of Truth)",
            port: 8020,
            user: "admin",
            pass: "[Master Password]"
        },
        {
            name: "Zabbix",
            desc: "Performance & Fault Monitoring",
            port: 8030,
            user: "Admin",
            pass: "zabbix"
        },
        {
            name: "Graylog",
            desc: "Centralized Log Management (SIEM)",
            port: 8040,
            user: "admin",
            pass: "[Master Password]"
        },
        {
            name: "Grafana",
            desc: "Unified Visualization Dashboards",
            port: 8050,
            user: "admin",
            pass: "admin"
        },
        {
            name: "Prometheus",
            desc: "Time-Series Metrics",
            port: 8060,
            user: "N/A",
            pass: "N/A"
        },
        {
            name: "ntopng",
            desc: "Traffic Flow Analysis",
            port: 8070,
            user: "admin",
            pass: "admin"
        },
        {
            name: "Oxidized",
            desc: "Automated Device Config Backups",
            port: 8080,
            user: "N/A",
            pass: "N/A"
        }
    ];

    const grid = document.getElementById('cardGrid');

    apps.forEach(app => {
        const url = `http://${host}:${app.port}`;
        const cardHtml = `
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">${app.name}</h3>
                    <div class="status-dot"></div>
                </div>
                <p class="card-desc">${app.desc}</p>
                <div class="credentials">
                    <div class="cred-row">
                        <span>User:</span><span>${app.user}</span>
                    </div>
                    <div class="cred-row">
                        <span>Pass:</span><span>${app.pass}</span>
                    </div>
                </div>
                <a href="${url}" target="_blank" class="btn">Launch Web UI</a>
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHtml);
    });

    async function unlockVault() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const err = document.getElementById('errorMsg');
        
        err.style.display = 'none';

        try {
            const response = await fetch('/api/unlock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            if (response.ok) {
                const data = await response.text();
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('vaultContent').style.display = 'block';
                document.getElementById('rawCredentials').textContent = data;
            } else {
                err.style.display = 'block';
            }
        } catch (error) {
            err.textContent = "Server connection error.";
            err.style.display = 'block';
        }
    }
</script>
</body>
</html>
