services:
  # --- Management ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: visionstack-portainer
    restart: always
    ports: [ "8010:9000" ]
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock", "./data/portainer:/data" ]

  netbox:
    image: netboxcommunity/netbox:latest
    container_name: visionstack-netbox
    restart: always
    ports: [ "8020:8080" ]
    environment:
      - SECRET_KEY=${NETBOX_SECRET_KEY}
      - DB_HOST=visionstack-postgres
      - REDIS_HOST=visionstack-redis
    depends_on: [ postgres, redis ]

  # --- Zabbix Tier ---
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
    container_name: visionstack-zabbix-server
    restart: always
    environment:
      - DB_SERVER_HOST=visionstack-postgres
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${MASTER_PWD}
    depends_on: [ postgres ]

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.0-latest
    container_name: visionstack-zabbix-web
    restart: always
    ports: [ "8030:8080" ]
    environment:
      - ZBX_SERVER_HOST=visionstack-zabbix-server
      - DB_SERVER_HOST=visionstack-postgres
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${MASTER_PWD}
    depends_on: [ zabbix-server ]

  zabbix-agent:
    image: zabbix/zabbix-agent2:ubuntu-7.0-latest
    container_name: visionstack-zabbix-agent
    restart: always
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ZBX_HOSTNAME=visionStack-Host
      - ZBX_SERVER_HOST=127.0.0.1

  # --- Observability Tier ---
  graylog:
    image: graylog/graylog:6.0
    container_name: visionstack-graylog
    restart: always
    ports:
      - "8040:9000"
      - "12201:12201/udp"
      - "514:1514/udp"
      - "514:1514/tcp"
    environment:
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2}
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET}
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_MONGODB_URI=mongodb://visionstack-mongodb:27017/graylog
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://visionstack-opensearch:9200
    depends_on: [ mongodb, opensearch ]

  grafana:
    image: grafana/grafana:latest
    container_name: visionstack-grafana
    restart: always
    ports: [ "8050:3000" ]

  prometheus:
    image: prom/prometheus:latest
    container_name: visionstack-prometheus
    restart: always
    ports: [ "8060:9090" ]

  ntopng:
    image: ntop/ntopng:latest
    container_name: visionstack-ntopng
    restart: always
    ports: [ "8070:3000" ]
    command: [ "--local-networks", "192.168.0.0/16", "--interface", "tcp://nprobe:5556" ]

  oxidized:
    image: oxidized/oxidized:latest
    container_name: visionstack-oxidized
    restart: always
    ports: [ "8080:8888" ]
    volumes: [ "./data/oxidized:/root/.config/oxidized" ]

  # --- Infrastructure Backend ---
  postgres:
    image: postgres:15-alpine
    container_name: visionstack-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${MASTER_PWD}

  mongodb:
    image: mongo:7.0
    container_name: visionstack-mongodb
    restart: always

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: visionstack-opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true

  redis:
    image: redis:7-alpine
    container_name: visionstack-redis
    restart: always
