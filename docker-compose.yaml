services:
  # --- Frontend Dashboard ---
  dashboard:
    image: python:3.11-slim
    container_name: visionstack-dashboard
    restart: always
    ports: [ "8100:8100" ]
    volumes:
      - ./dashboard:/app:ro
      - ./visionstack_credentials.txt:/app/visionstack_credentials.txt:ro
      - /etc/shadow:/host/shadow:ro
    working_dir: /app
    command: python /app/server.py

  # --- Management ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: visionstack-portainer
    restart: always
    ports: [ "8010:9000" ]
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock", "./data/portainer:/data" ]

  netbox:
    image: netboxcommunity/netbox:latest
    container_name: visionstack-netbox
    restart: always
    ports: [ "8020:8080" ]
    environment:
      - SECRET_KEY=${NETBOX_SECRET_KEY}
      - DB_HOST=visionstack-postgres-netbox
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=${MASTER_PWD}
      - REDIS_HOST=visionstack-redis
    depends_on: [ postgres-netbox, redis ]

  # --- Zabbix Tier ---
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
    container_name: visionstack-zabbix-server
    restart: always
    environment:
      - DB_SERVER_HOST=visionstack-postgres-zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${MASTER_PWD}
      - POSTGRES_DB=zabbix
      - ZBX_STARTCONNECTORS=1
      - ZBX_STARTPOLLERS=50
      - ZBX_STARTPREPROCESSORS=15
      - ZBX_STARTTRAPPERS=10
      - ZBX_STARTDISCOVERERS=5
      - ZBX_STARTPINGERS=25
      - ZBX_CACHESIZE=256M
      - ZBX_HISTORYCACHESIZE=64M
    depends_on: [ postgres-zabbix ]

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.0-latest
    container_name: visionstack-zabbix-web
    restart: always
    ports: [ "8030:8080" ]
    environment:
      - ZBX_SERVER_HOST=visionstack-zabbix-server
      - DB_SERVER_HOST=visionstack-postgres-zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${MASTER_PWD}
      - POSTGRES_DB=zabbix
    depends_on: [ zabbix-server, postgres-zabbix ]

  zabbix-agent:
    image: zabbix/zabbix-agent2:ubuntu-7.0-latest
    container_name: visionstack-zabbix-agent
    restart: always
    user: root
    pid: host
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ZBX_HOSTNAME=Zabbix server
      - ZBX_SERVER_HOST=visionstack-zabbix-server
      - ZBX_SERVER_ACTIVE=visionstack-zabbix-server
      - ZBX_ALLOWROOT=1

  # --- Observability Tier ---
  graylog:
    image: graylog/graylog:7.0
    container_name: visionstack-graylog
    restart: always
    ports:
      - "8040:9000"
      - "12201:12201/udp"
      - "514:1514/udp"
      - "514:1514/tcp"
    environment:
      - GRAYLOG_SERVER_JAVA_OPTS="-Xms1g -Xmx1g"
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2}
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET}
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_MONGODB_URI=mongodb://visionstack-mongodb:27017/graylog
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://visionstack-opensearch:9200
    depends_on: [ mongodb, opensearch ]

  grafana:
    image: grafana/grafana:latest
    container_name: visionstack-grafana
    restart: always
    ports: [ "8050:3000" ]
    environment:
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app,redis-datasource

  prometheus:
    image: prom/prometheus:latest
    container_name: visionstack-prometheus
    restart: always
    ports: [ "8060:9090" ]

  ntopng:
    image: ntop/ntopng:latest
    container_name: visionstack-ntopng
    restart: always
    ports: [ "8070:3000" ]
    command: [ "--local-networks", "192.168.0.0/16", "--interface", "tcp://nprobe:5556" ]

  oxidized:
    image: oxidized/oxidized:latest
    container_name: visionstack-oxidized
    restart: always
    ports: [ "8080:8888" ]
    volumes: [ "./data/oxidized:/root/.config/oxidized" ]

  # --- Security & AAA Tier ---
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: visionstack-freeradius
    restart: always
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      - JUMPCLOUD_SHARED_SECRET=${JUMPCLOUD_SHARED_SECRET}
      - LOCAL_RADIUS_SECRET=${LOCAL_RADIUS_SECRET}
    volumes:
      - ./data/freeradius:/etc/raddb

  ldap-proxy:
    image: alpine:latest
    container_name: visionstack-ldap-proxy
    restart: always
    command: >
      /bin/sh -c "
      apk add --no-cache stunnel &&
      echo 'foreground = yes' > /etc/stunnel/stunnel.conf &&
      echo '[ldaps]' >> /etc/stunnel/stunnel.conf &&
      echo 'accept = 0.0.0.0:389' >> /etc/stunnel/stunnel.conf &&
      echo 'connect = ldap.jumpcloud.com:636' >> /etc/stunnel/stunnel.conf &&
      echo 'client = yes' >> /etc/stunnel/stunnel.conf &&
      stunnel /etc/stunnel/stunnel.conf
      "

  # --- Infrastructure Backend ---
  postgres-netbox:
    image: postgres:15-alpine
    container_name: visionstack-postgres-netbox
    restart: always
    environment:
      - POSTGRES_DB=netbox
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=${MASTER_PWD}
    command: postgres -c max_connections=250 -c shared_buffers=512MB
    volumes:
      - ./data/postgres-netbox:/var/lib/postgresql/data

  postgres-zabbix:
    image: postgres:15-alpine
    container_name: visionstack-postgres-zabbix
    restart: always
    environment:
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${MASTER_PWD}
    command: postgres -c max_connections=250 -c shared_buffers=512MB
    volumes:
      - ./data/postgres-zabbix:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    container_name: visionstack-mongodb
    restart: always
    volumes:
      - ./data/mongodb:/data/db

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: visionstack-opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data

  redis:
    image: redis:7-alpine
    container_name: visionstack-redis
    restart: always

networks:
  default:
    name: visionstack-network
